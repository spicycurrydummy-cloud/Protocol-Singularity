name: Request Unity Activation File

# Unity ライセンスを初めて取得するときだけ手動で走らせる workflow。
# 実行すると .alf が artifact として出力される → ブラウザで .ulf に変換 → UNITY_LICENSE secret に貼る。
# 詳細は .github/DEPLOY.md を参照。

on:
  workflow_dispatch:

jobs:
  request:
    name: Request .alf activation file
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.1f1-webgl-3
      options: --user root
    steps:
      - name: Create manual activation file
        run: |
          cd $GITHUB_WORKSPACE
          # Unity -createManualActivationFile は exit code 非ゼロで終わるため || true で継続
          /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -createManualActivationFile \
            -quit \
            -logFile /dev/stdout || true
          ls -la *.alf

      - name: Upload .alf as artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: "*.alf"
          retention-days: 1
